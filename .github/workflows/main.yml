name: Export e-Qazyna XLSX

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "Сколько первых страниц реестра проверить"
        required: true
        default: "5"
      doc_type:
        description: "Тип документа"
        required: true
        default: "Заявка на разведку ТПИ"
      statuses:
        description: "Статусы через запятую"
        required: true
        default: "Отправлено на рассмотрение,Принято"
      no_egov:
        description: "Отключить обогащение eGov"
        required: true
        type: boolean
        default: false

concurrency:
  group: eqazyna-export
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build XLSX export
        env:
          EGOV_API_KEY: ${{ secrets.EGOV_API_KEY }}
          DOC_TYPE: ${{ inputs.doc_type }}
          STATUSES: ${{ inputs.statuses }}
        run: |
          FLAGS=""
          if [ "${{ inputs.no_egov }}" = "true" ]; then FLAGS="$FLAGS --no-egov"; fi
          python -m eqazyna_export.main \
            --pages "${{ inputs.pages }}" \
            --doc-type "$DOC_TYPE" \
            --statuses "$STATUSES" \
            --out "exports/eqazyna_export.xlsx" \
            $FLAGS
          ls -lah exports

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: eqazyna-xlsx-export
          path: exports/*.xlsx
          if-no-files-found: error
          retention-days: 14
